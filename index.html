<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sasan Dehghan — Portfolio</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Georgia, serif; color: #1a1a1a; background: #fafaf8; }
    .header { padding: 3rem 2rem 2rem; border-bottom: 1px solid #e5e5e0; max-width: 700px; margin: 0 auto; }
    .label { font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; color: #888; margin-bottom: 1rem; font-family: Arial, sans-serif; }
    .name { font-size: 36px; font-weight: normal; margin-bottom: 0.5rem; }
    .divider { width: 40px; height: 1.5px; background: #1a1a1a; margin: 1.5rem 0; }
    .contact-row { font-size: 14px; color: #555; font-family: Arial, sans-serif; padding: 6px 0; }
    .btn-download { display: inline-flex; align-items: center; gap: 8px; margin-top: 1.5rem; padding: 12px 24px; background: #1a1a1a; color: #fff; border-radius: 6px; font-size: 14px; text-decoration: none; font-family: Arial, sans-serif; }
    .btn-download:hover { background: #333; }
    .portfolio-section { padding: 2rem; max-width: 700px; margin: 0 auto; }
    .footer { padding: 1.5rem 2rem; text-align: center; font-size: 12px; color: #aaa; font-family: Arial, sans-serif; border-top: 1px solid #e5e5e0; }
  </style>
</head>
<body>

  <div class="header">
    <p class="label">Portfolio</p>
    <h1 class="name">Sasan Dehghan</h1>
    <div class="divider"></div>
    <p class="contact-row">✉ your.email@example.com</p>
    <p class="contact-row">📞 +1 234 567 890</p>
    <p class="contact-row">📍 Your City, Country</p>
    <a href="Question B.pdf" download class="btn-download">⬇ Download portfolio</a>
  </div>

  <div class="portfolio-section">
    <embed src="Question B.pdf" type="application/pdf" width="100%" height="850px" />
  </div>

  <div class="footer">© 2026 Sasan Dehghan · All rights reserved</div>

</body>
</html>
